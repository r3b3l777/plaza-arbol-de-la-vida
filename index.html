<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#20252d" />
    <!--
      Solo se precarga lo que se VE en la primera pantalla: el árbol de la
      intro (51 KB en WebP). El GLB y el HDR del árbol 3D los pide el propio
      componente cuando la página ya está interactiva, y los mp3 solo si el
      usuario entra con sonido — antes los tres se descargaban desde el primer
      byte y competían con la primera pintura.
    -->
    <link rel="preload" as="image" href="/img/arbol-marca-blanco.webp" fetchpriority="high" />
    <meta
      name="description"
      content="Plaza Árbol de la Vida — el punto de encuentro perfecto en Metepec. 19 establecimientos de gastronomía, salud, belleza, bienestar y arte. Abierto todos los días de 7:00 a 23:30."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Italiana&family=Red+Hat+Display:ital,wght@0,300..700;1,300..700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / redes sociales -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Plaza Árbol de la Vida · Metepec" />
    <meta
      property="og:description"
      content="Gastronomía, salud, arte y bienestar en el corazón de Metepec. 19 establecimientos · 1 local disponible de 79 m²."
    />
    <meta property="og:image" content="/img/og-image.jpg" />
    <meta property="og:locale" content="es_MX" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Plaza Árbol de la Vida · Metepec</title>

    <!-- Datos estructurados: ficha de negocio para buscadores -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ShoppingCenter",
        "name": "Plaza Árbol de la Vida",
        "description": "Plaza comercial en Metepec, Pueblo Mágico: gastronomía, salud, belleza, bienestar y arte.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Av. Adolfo López Mateos 2330, Bella Vista",
          "postalCode": "52172",
          "addressLocality": "Metepec",
          "addressRegion": "Estado de México",
          "addressCountry": "MX"
        },
        "telephone": "+527222385599",
        "openingHours": "Mo-Su 07:00-23:30",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.6",
          "reviewCount": "62"
        },
        "image": "/img/og-image.jpg"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
